spring:
  application:
    name: app-go-backend

app:
  auth:
    demo:
      username: demo
      password: demo-password
    jwt:
      issuer: app-go-backend
      secret: change-me-in-production-change-me-in-production
      access-token-ttl: 15m
      refresh-token-ttl: 7d
  katago:
    timeout: 5000
    retry-count: 2
    retry-delay-ms: 500
    enabled: true

# Server configuration
server:
  port: 8080

# Logging
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %5p [%thread] %c{1}:%L - %m%n"
  level:
    root: INFO
    com.appgo: DEBUG

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    enable:
      jvm: true
      process: true
      logback: true
