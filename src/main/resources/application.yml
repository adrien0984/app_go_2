spring:
  application:
    name: app-go-backend

app:
  auth:
    demo:
      username: demo
      password: demo-password
    jwt:
      issuer: app-go-backend
      secret: change-me-in-production-change-me-in-production
      access-token-ttl: 15m
      refresh-token-ttl: 7d

# Server configuration
server:
  port: 8080

# Logging
logging:
  level:
    root: INFO
    com.appgo: DEBUG

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
