logging:
  level:
    root: INFO
    com.appgo: DEBUG
    org.springframework.web: DEBUG

server:
  port: 8080

app:
  reset:
    enabled: true

spring:
  datasource:
    url: jdbc:h2:file:./data/appgo
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
