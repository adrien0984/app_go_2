spring:
  application:
    name: app-go-backend

# Server configuration
server:
  port: 8080

# Logging
logging:
  level:
    root: INFO
    com.appgo: DEBUG

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

